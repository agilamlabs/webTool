name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow on-demand triggering of the integration job without a push
  workflow_dispatch:
  # Nightly run -- catches drift in upstream search engines / CAPTCHA
  # behavior + Playwright browser releases without blocking PRs.
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check web_agent tests

      - name: Ruff format check
        run: python -m ruff format --check web_agent tests

      - name: Mypy
        run: python -m mypy web_agent

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests with coverage
        # Skip browser/network integration tests -- those run elsewhere.
        run: |
          python -m pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_browser_actions.py \
            --ignore=tests/test_agent.py

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  integration:
    name: Integration tests (Playwright + network)
    # Skip on PRs -- search engines can serve CAPTCHAs from CI's IPs
    # and that flakiness shouldn't block legitimate PR merges. Runs on
    # push-to-main (post-merge sanity), nightly schedule (catch drift),
    # and manual dispatch.
    if: github.event_name != 'pull_request'
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Don't fail the overall workflow if a search engine flakes -- the
    # integration job's value is signal, not gating.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright Chromium + system deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Run integration tests (browser + network)
        run: |
          python -m pytest tests/test_browser_actions.py tests/test_agent.py \
            -v --tb=short --maxfail=5 --durations=10

      - name: Upload integration test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-debug
          path: |
            debug/
            screenshots/
          retention-days: 3
          if-no-files-found: ignore
